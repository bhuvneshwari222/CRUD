<hr>
<h2 class="text-center text-danger mb-2">5 Post Task</h2>
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3>Add Post</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input #titleControl type="text" class="form-control">
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <input #contentControl type="text" class="form-control">
                </div>
                <button *ngIf="!isInEditMode" (click)="onAddPost()" class="btn btn-sm btn-info btn-block">Add Post</button>
                <button *ngIf="isInEditMode" (click)="onUpdatePost()" class="btn btn-sm btn-info btn-block">Update Post</button>
            </div>
        </div>
    </div>
</div>

<div class="row" *ngIf="postArr.length > 0; else noPost">
    <div *ngFor="let post of postArr" class="col-md-4 mt-4">
        <div class="card h-100">
            <div class="card-header">
                <h3>{{post.title}}</h3>
            </div>
            <div class="card-body">
                <p>{{post.content}}</p>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <button (click)="onEdit(post)" class="btn-sm btn-info">Edit</button>
                <button (click)="onRemove(post.postID)" class="btn-sm btn-danger">Remove</button>
            </div>
        </div>
    </div>
</div>
<ng-template #noPost>
    <p class="alert alert-info">No Post Added Yet!!!</p>
</ng-template>
