<hr>
<h2 class="text-center text-danger mb-2">9 Books CRUD</h2>
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3>Add Book</h3>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input #titleControl type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="author">Author</label>
                        <input #authorControl type="text" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input #categoryControl type="text" class="form-control">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea rows="3" #descriptionControl type="text" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label for="image">Book Image</label>
                    <input #imageControl type="text" class="form-control">
                </div>
                <button *ngIf="!isInEditMode" (click)="onAddBook()" class="btn btn-sm btn-block btn-info">Add
                    Book</button>
                <button *ngIf="isInEditMode" (click)="onUpdateBook()" class="btn btn-sm btn-block btn-info">Update
                    Book</button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="booksArr.length > 0; else noBook" class="row bookContainer">
    <div *ngFor="let book of booksArr; trackBy: trackByFun" class="col-md-4 mt-4">
        <div class="card h-100">
            <div class="card-header">
                <h3>{{book.title}}</h3>
            </div>
            <div class="card-body p-0">
                <figure>
                    <img [src]="book.image" alt="bookImage" title="bookImage">
                    <figcaption>
                        <p><strong>Category- </strong>{{book.category}}</p>
                        <p><strong>Author- </strong>{{book.author}}</p>
                        <p>{{book.description}}</p>
                        <div class="d-flex justify-content-between mt-2">
                            <button (click)="onEdit(book)" class="btn btn-sm btn-info">Edit</button>
                            <button (click)="onRemove(book.bookID)" class="btn btn-sm btn-danger">Remove</button>
                        </div>
                    </figcaption>
                </figure>
            </div>
        </div>
    </div>
</div>

<ng-template #noBook>
    <p class="alert alert-info">No Book Added Yet!!!</p>
</ng-template>
