<h2 class="text-center text-danger mb-2">1 Todo Task</h2>
<div class="row">
    <div class="col-md-6 mb-4 mb-md-0">
        <div class="card">
            <div class="card-header">
                <h3>Add Skill</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <input #todoControl type="text" class="form-control">
                </div>
                <button *ngIf="!isInEditMode" (click)="onSkillAdd(todoControl)"
                    class="btn btn-sm btn-block btn-info">Add Skill</button>
                <button *ngIf="isInEditMode" (click)="onSkillUpdate(todoControl)"
                    class="btn btn-sm btn-block btn-info">Update Skill</button>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Todo List</h3>
            </div>
            <div class="card-body">
                <ul class="list-group" *ngIf="skillsArr.length > 0; else noSkill">
                    <li *ngFor="let skill of skillsArr; trackby: trackByFun"
                        class="list-group-item d-flex justify-content-between">
                        <strong>{{skill.todoItem}}</strong>
                        <div>
                            <i (click)="onEdit(skill)"
                                class="fa-solid fa-pen-to-square fa-2x text-info mr-3 text-align-center"
                                role="button"></i>
                            <i (click)="onRemove(skill.todoID)"
                                class="fa-solid fa-trash-can fa-2x text-danger text-align-center" role="button"></i>
                        </div>
                    </li>
                </ul>
            </div>
        </div>

        <ng-template #noSkill>
            <p class="alert alert-info">No Skill Added Yet!!!</p>
        </ng-template>
    </div>
</div>
